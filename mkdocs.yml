site_name: kitepy
site_description: Dead Simple Deep Learning - Build and train models with minimal code
site_url: https://kitepy.pages.dev
repo_url: https://github.com/yourusername/kitepy
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Getting Started:
      - Introduction: introduction.mdx
      - Quickstart: quickstart.mdx
      - Installation: installation.mdx
  - Core Concepts:
      - Philosophy: concepts/philosophy.mdx
      - Architecture: concepts/architecture.mdx
      - Configuration: concepts/configuration.mdx
  - Vision Models:
      - CNN: vision/cnn.mdx
      - Transformers: vision/transformers.mdx
      - Datasets: vision/datasets.mdx
      - Augmentation: vision/augmentation.mdx
  - Training:
      - Basics: training/basics.mdx
      - Callbacks: training/callbacks.mdx
      - Optimization: training/optimization.mdx
      - Distributed: training/distributed.mdx
  - Advanced:
      - Transfer Learning: advanced/transfer-learning.mdx
      - Profiling: advanced/profiling.mdx
      - Export: advanced/export.mdx
      - Hyperparameter Tuning: advanced/hyperparameter-tuning.mdx
  - API Reference:
      - Models:
          - CNN: api-reference/cnn.mdx
          - Transformer: api-reference/transformer.mdx
          - Vision: api-reference/vision.mdx
      - Configuration:
          - Training Config: api-reference/training-config.mdx
          - Model Config: api-reference/model-config.mdx
          - Data Config: api-reference/data-config.mdx
      - Core:
          - Engine: api-reference/engine.mdx
          - Callbacks: api-reference/callbacks.mdx
          - Metrics: api-reference/metrics.mdx
      - Utilities:
          - Presets: api-reference/presets.mdx
          - Utils: api-reference/utils.mdx
  - Examples:
      - Tutorials:
          - Quickstart CNN: examples/quickstart-cnn.mdx
          - Quickstart ViT: examples/quickstart-vit.mdx
          - Transfer Learning: examples/transfer-learning.mdx
          - Custom Model: examples/custom-model.mdx
      - Real-World Projects:
          - CIFAR Classification: examples/cifar-classification.mdx
          - ImageNet Training: examples/imagenet-training.mdx
          - Fine-tuning Pretrained: examples/fine-tuning-pretrained.mdx
